services:
  web:
    build: .
    container_name: django_web
    restart: unless-stopped

    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn Bunker_project.wsgi:application
      --bind 0.0.0.0:8000
      --workers 3
      --threads 2
      --timeout 120
      "

    volumes:
      - .:/app

    ports:
      - "8000:8000"

    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: django_redis
    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    command: redis-server --appendonly yes

volumes:
  redis_data:
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}PartyUp{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0b0f1a;
      --surface:  #111827;
      --card:     #1a2235;
      --border:   #253047;
      --gold:     #f5a623;
      --gold-dim: #b37818;
      --teal:     #2de0c4;
      --red:      #e84545;
      --text:     #e8eaf0;
      --muted:    #6b7a99;
      --radius:   6px;
      --font-head: 'Barlow Condensed', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── NOISE OVERLAY ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(11,15,26,.92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem;
      height: 58px;
    }

    .nav-brand {
      font-family: var(--font-head);
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: .06em;
      color: var(--gold);
      text-decoration: none;
    }
    .nav-brand span { color: var(--text); }

    .nav-links { display: flex; align-items: center; gap: .25rem; }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: .85rem;
      font-weight: 500;
      letter-spacing: .03em;
      padding: .4rem .75rem;
      border-radius: var(--radius);
      transition: color .2s, background .2s;
    }
    .nav-links a:hover { color: var(--text); background: var(--border); }

    .nav-links .btn-gold {
      background: var(--gold); color: #000;
      font-weight: 700;
    }
    .nav-links .btn-gold:hover { background: #ffbe45; color: #000; }

    /* ── LAYOUT ── */
    .page-wrap {
      position: relative; z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }

    /* ── HEADINGS ── */
    h1, h2, h3 {
      font-family: var(--font-head);
      font-weight: 800;
      letter-spacing: .04em;
      line-height: 1.1;
    }
    h1 { font-size: 2.6rem; color: var(--gold); }
    h2 { font-size: 1.7rem; }
    h3 { font-size: 1.2rem; }

    /* ── CARDS ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.6rem;
    }

    /* ── FORMS ── */
    label {
      display: block;
      font-size: .8rem;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .4rem;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    select, textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-body);
      font-size: .95rem;
      padding: .65rem 1rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(245,166,35,.15);
    }

    .field { margin-bottom: 1.1rem; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: .5rem;
      font-family: var(--font-head);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .06em;
      padding: .6rem 1.4rem;
      border-radius: var(--radius);
      border: none; cursor: pointer;
      text-decoration: none;
      transition: transform .15s, box-shadow .15s, background .15s;
    }
    .btn:active { transform: scale(.97); }

    .btn-primary {
      background: var(--gold); color: #000;
    }
    .btn-primary:hover { background: #ffbe45; box-shadow: 0 4px 16px rgba(245,166,35,.35); }

    .btn-outline {
      background: transparent; color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold); }

    .btn-danger { background: var(--red); color: #fff; }
    .btn-danger:hover { background: #ff5555; }

    .btn-teal { background: var(--teal); color: #000; }
    .btn-teal:hover { background: #4ffae5; }

    .btn-sm { font-size: .85rem; padding: .4rem .9rem; }
    .btn-full { width: 100%; }

    /* ── MESSAGES ── */
    .messages { margin-bottom: 1.25rem; }
    .msg {
      padding: .7rem 1rem;
      border-radius: var(--radius);
      font-size: .9rem;
      margin-bottom: .5rem;
      border-left: 3px solid;
    }
    .msg-success { background: rgba(45,224,196,.08); border-color: var(--teal); color: var(--teal); }
    .msg-error   { background: rgba(232,69,69,.08);  border-color: var(--red);  color: var(--red); }
    .msg-warning { background: rgba(245,166,35,.08); border-color: var(--gold); color: var(--gold); }
    .msg-info    { background: rgba(245,166,35,.08); border-color: var(--gold); color: var(--gold); }

    /* ── BADGE ── */
    .badge {
      display: inline-block;
      font-family: var(--font-head);
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .06em;
      padding: .15rem .55rem;
      border-radius: 99px;
      vertical-align: middle;
    }
    .badge-gold  { background: rgba(245,166,35,.18); color: var(--gold); border: 1px solid var(--gold-dim); }
    .badge-teal  { background: rgba(45,224,196,.12); color: var(--teal); border: 1px solid #1a9e8e; }
    .badge-muted { background: var(--border); color: var(--muted); }

    /* ── DIVIDER ── */
    .divider {
      border: none; border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }
    .empty-icon { font-size: 2.5rem; margin-bottom: .5rem; }

    /* ── PAGE HEADER ── */
    .page-header {
      display: flex; align-items: flex-end; justify-content: space-between;
      margin-bottom: 2rem;
      gap: 1rem;
    }
    .page-header .subtitle {
      color: var(--muted);
      font-size: .95rem;
      margin-top: .25rem;
    }

    /* ── GRID ── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 1rem; }

    @media (max-width: 640px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
      .field-row { grid-template-columns: 1fr; }
      .page-header { flex-direction: column; align-items: flex-start; }
      nav { padding: 0 1rem; }
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .anim { animation: fadeUp .4s ease both; }
    .anim-d1 { animation-delay: .05s; }
    .anim-d2 { animation-delay: .1s; }
    .anim-d3 { animation-delay: .15s; }
    .anim-d4 { animation-delay: .2s; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

{% if request.user.is_authenticated %}
<nav>
  <a class="nav-brand" href="{% url 'main' %}">PARTY<span>UP</span></a>
  <div class="nav-links">
    <a href="{% url 'main' %}">Home</a>
    <a href="{% url 'friends' %}">Friends</a>
    <a href="{% url 'find_party' %}">Find Party</a>
    <a href="{% url 'account' %}">Account</a>
    <a href="{% url 'logout' %}" class="btn-gold" style="border-radius:5px;padding:.35rem .85rem;font-family:var(--font-head);font-weight:700;font-size:.9rem;">Logout</a>
  </div>
</nav>
{% endif %}

<div class="page-wrap">
  {% if messages %}
  <div class="messages anim">
    {% for message in messages %}
    <div class="msg msg-{{ message.tags }}">{{ message }}</div>
    {% endfor %}
  </div>
  {% endif %}

  {% block content %}{% endblock %}
</div>

</body>
</html>

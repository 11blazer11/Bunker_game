{% extends 'base.html' %}

{% block title %}Join Party - Bunker{% endblock %}
{% block header %}Join a Party{% endblock %}
{% block subtitle %}Enter a lobby code or browse public lobbies.{% endblock %}

{% block content %}
<div class="card" style="max-width: 520px; width: 100%;">
    <form method="post" class="form-grid">
        {% csrf_token %}
        <input type="text" name="party_code" placeholder="Lobby Code" required>
        <button class="primary-button" type="submit">Join Party</button>
    </form>

    <div class="button-row" style="margin-top: 24px;">
        <a class="secondary-button" href="{% url 'find_party' %}">Browse Available Lobbies</a>
        <a class="secondary-button" href="{% url 'main' %}">Back to Main</a>
    </div>
</div>
{% endblock %}

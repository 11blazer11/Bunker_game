{% extends 'base.html' %}

{% block title %}Create Party - Bunker{% endblock %}
{% block header %}Create a Party{% endblock %}
{% block subtitle %}Launch a new lobby and invite others to join.{% endblock %}

{% block content %}
<div class="card" style="max-width: 520px; width: 100%;">
    <form method="post" class="form-grid">
        {% csrf_token %}
        <input type="text" name="party_name" placeholder="Party Name" required>
        <button class="primary-button" type="submit">Create Lobby</button>
    </form>
    <div class="button-row" style="margin-top: 20px;">
        <a class="secondary-button" href="{% url 'main' %}">Back to Main</a>
    </div>
</div>
{% endblock %}

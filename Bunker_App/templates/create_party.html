<!-- templates/create_party.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Party - Bunker</title>
    <style>
        body {
            margin: 0; 
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }
        h1 {
            margin-bottom: 30px;
            color: #f5a623;
        }
        .input-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 300px;
        }
        input, button {
            padding: 15px;
            font-size: 18px;
            border-radius: 8px;
            border: none;
        }
        button {
            background-color: #f5a623;
            color: #000;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background-color: #fff;
        }
    </style>
</head>
<body>
    <h1>Create a Party</h1>
    <form class="input-container" method="post">
        {% csrf_token %}
        <input type="text" name="party_name" placeholder="Party Name" required>
        <button type="submit">Create</button>
    </form>
    <br>
    <a href="{% url 'main' %}" style="color: #f5a623;">Back to Main</a>
</body>
</html>

{% extends "base.html" %}
{% block title %}Create Party — PartyUp{% endblock %}

{% block content %}
<div style="max-width:480px; margin:0 auto;">
  <div class="page-header anim" style="flex-direction:column; text-align:center; justify-content:center;">
    <h1 style="font-size:2rem;">Leave & Create?</h1>
    <p class="subtitle">You're already in a party</p>
  </div>

  <div class="card anim anim-d1" style="text-align:center;">
    <p style="color:var(--muted); margin-bottom:1.4rem;">
      You're currently in <strong style="color:var(--text)">{{ current_lobby.name }}</strong>. 
      Creating a new lobby will remove you from your current party.
    </p>

    <div style="display:flex; gap:.75rem; justify-content:center; flex-wrap:wrap;">
      <form method="POST" action="{% url 'create_party' %}">
        {% csrf_token %}
        <button type="submit" class="btn btn-primary">Yes, Create New Party</button>
      </form>
      <a href="{% url 'main' %}" class="btn btn-outline">Cancel</a>
    </div>
  </div>
</div>
{% endblock %}

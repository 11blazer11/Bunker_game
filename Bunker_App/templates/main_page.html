<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bunker Game - Main Lobby</title>
    <style>
        /* General Body */
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a1a, #333333);
            color: #fff;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background-color: #111;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar h1 {
            margin: 0;
            font-size: 24px;
            color: #f5a623;
            letter-spacing: 1px;
        }

        .navbar .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .navbar .nav-right span {
            font-weight: bold;
            color: #f5a623;
        }

        .navbar .nav-right a {
            padding: 8px 16px;
            background-color: #f44336;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            transition: 0.3s;
        }

        .navbar .nav-right a:hover {
            background-color: #d32f2f;
        }

        /* Main Content Box */
        .main-box {
            max-width: 500px;
            margin: 80px auto;
            background-color: rgba(0,0,0,0.8);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
        }

        .main-box h2 {
            font-size: 32px;
            margin-bottom: 30px;
            color: #f5a623;
        }

        /* Game Buttons */
        .button-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .game-button {
            padding: 20px;
            font-size: 22px;
            background-color: #f44336;
            border: none;
            border-radius: 12px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .game-button:hover {
            background-color: #d32f2f;
            transform: scale(1.05);
        }

        /* Responsive */
        @media(max-width: 600px) {
            .main-box {
                margin: 40px 20px;
                padding: 30px;
            }
            .game-button {
                font-size: 20px;
                padding: 15px;
            }
        }

    </style>
</head>
<body>

    <!-- Navbar -->
    <div class="navbar">
        <h1>Bunker</h1>
        <div class="nav-right">
            <span>{{ request.user.username }}</span>
            <a href="{% url 'logout' %}">Logout</a>
        </div>
    </div>

    <!-- Main Lobby -->
    <div class="main-box">
        <h2>Welcome to the Lobby</h2>
        <div class="button-container">
            <a href="{% url 'join_party' %}" class="game-button">Join Party</a>
            <a href="{% url 'create_party' %}" class="game-button">Create Party</a>
            <a href="{% url 'find_party' %}" class="game-button">Find Party</a>
        </div>
    </div>

</body>
</html>

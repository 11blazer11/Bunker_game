{% extends "base.html" %}
{% block title %}Switch Party? — PartyUp{% endblock %}

{% block content %}
<div style="max-width:480px; margin:0 auto;">
  <div class="page-header anim" style="flex-direction:column; text-align:center; justify-content:center;">
    <h1 style="font-size:2rem;">Switch Party?</h1>
    <p class="subtitle">You're already in a lobby</p>
  </div>

  <div class="card anim anim-d1" style="text-align:center;">
    <p style="color:var(--muted); margin-bottom:1.4rem;">
      You're currently in <strong style="color:var(--text)">{{ current_lobby.name }}</strong>. 
      Joining <strong style="color:var(--gold)">{{ new_lobby.name }}</strong> will remove you from your current party.
    </p>

    <div style="display:flex; gap:.75rem; justify-content:center; flex-wrap:wrap;">
      <form method="POST" action="{% url 'join_party' %}">
        {% csrf_token %}
        <input type="hidden" name="party_code" value="{{ party_code }}" />
        <input type="hidden" name="confirm" value="true" />
        <button type="submit" class="btn btn-primary">Yes, Switch</button>
      </form>
      <a href="{% url 'main' %}" class="btn btn-outline">Cancel</a>
    </div>
  </div>
</div>
{% endblock %}

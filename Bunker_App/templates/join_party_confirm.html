<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Confirm Lobby Change - Bunker</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .confirm-box {
            background: rgba(0, 0, 0, 0.85);
            border-radius: 16px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        h1 {
            margin-bottom: 20px;
            color: #f5a623;
        }
        p {
            line-height: 1.6;
            margin-bottom: 25px;
        }
        .lobby-info {
            background: rgba(255,255,255,0.08);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: left;
        }
        .button-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        button, .cancel-link {
            padding: 12px 22px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
        }
        button {
            background-color: #f5a623;
            color: #000;
        }
        .cancel-link {
            background: #444;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="confirm-box">
        <h1>Confirm Lobby Switch</h1>
        <p>You already have a lobby:</p>
        <div class="lobby-info">
            <strong>Current lobby:</strong> {{ current_lobby.name }}<br>
            <strong>Code:</strong> {{ current_lobby.code }}
        </div>
        <p>If you join this new lobby, your current lobby will be removed.</p>
        <div class="lobby-info">
            <strong>New lobby:</strong> {{ new_lobby.name }}<br>
            <strong>Code:</strong> {{ new_lobby.code }}
        </div>
        <form method="post" style="display: inline-block; margin-right: 10px;">
            {% csrf_token %}
            <input type="hidden" name="party_code" value="{{ party_code }}">
            <input type="hidden" name="confirm" value="true">
            <button type="submit">Yes, join new lobby</button>
        </form>
        <a class="cancel-link" href="{% url 'join_party' %}">Cancel</a>
    </div>
</body>
</html>

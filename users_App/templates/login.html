{% extends "base.html" %}
{% block title %}Login — Bunker{% endblock %}

{% block extra_head %}
<style>
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
  .auth-wrap {
    width: 100%; max-width: 420px;
    animation: fadeUp .45s ease both;
  }
  .auth-logo {
    font-family: var(--font-head);
    font-size: 2.8rem;
    font-weight: 800;
    letter-spacing: .06em;
    text-align: center;
    margin-bottom: .25rem;
  }
  .auth-logo span { color: var(--gold); }
  .auth-sub { text-align: center; color: var(--muted); font-size: .9rem; margin-bottom: 2rem; }
  .auth-footer { text-align: center; margin-top: 1.25rem; color: var(--muted); font-size: .88rem; }
  .auth-footer a { color: var(--gold); text-decoration: none; font-weight: 500; }
  .auth-footer a:hover { text-decoration: underline; }

  /* glow orb bg */
  .glow-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(90px);
    pointer-events: none;
    z-index: 0;
  }
  .orb1 { width: 380px; height: 380px; background: rgba(245,166,35,.07); top: -80px; left: -80px; }
  .orb2 { width: 300px; height: 300px; background: rgba(45,224,196,.05); bottom: -60px; right: -60px; }
</style>
{% endblock %}

{% block content %}
<div class="glow-orb orb1"></div>
<div class="glow-orb orb2"></div>

<div class="auth-wrap">
  <div class="auth-logo">BUN<span>KER</span></div>
  <p class="auth-sub">Sign in to join your crew</p>

  <div class="card">
    <form method="POST" action="{% url 'login' %}">
      {% csrf_token %}
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:.5rem;">Sign In</button>
    </form>
  </div>

  <p class="auth-footer">
    Don't have an account? <a href="{% url 'register' %}">Create one</a>
  </p>
</div>
{% endblock %}
